<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Endgame — Federal Force Scout</title>

  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./endgame.css">
</head>
<body>

  <main class="app">
    <header class="header">
      <div class="brand">
        <img src="./logoscoutatt.png" alt="Federal Scout" class="logo">
       

        
        <div>
          <h1 class="team">FEDERAL SCOUT</h1>
          <p class="sub">Scout FASE — Endgame</p>
        </div>
      </div>

      <div class="meta-actions">
        <button id="backBtn" class="btn ghost" type="button" onclick="window.location.href='teleop.html'">Anterior</button>
        <button id="finishBtn" class="btn ghost" type="button">Finalizar</button>
      </div>
    </header>

    <section class="main-grid">
      <form id="endForm" class="card form-card" autocomplete="off" novalidate>
        <h2 class="card-title">Fase Endgame - 30Seg FINAIS</h2>

        <!--  Volume por ciclo (agora é botão, mas mantém ID do banco) -->
        <div class="grid-1">
          <label class="label">Volume por ciclo:</label>

          <!-- Ciclo de pontuação (bolinha +1) -->
<div class="grid-1">
  <div class="field">
    <span class="label">Ciclo de pontuação (toda vez que o robô descarregar no HUB)</span>

    <div class="ciclo-row">

      <button id="maisCiclo" class="bubble-btn" type="button" aria-label="Adicionar +1"></button>

      <input id="cicloPontuacao" class="ciclo-input" type="number" min="0" step="1" value="0" readonly>
    </div>
  </div>
</div>

        <!-- Climber -->
        <div class="grid-1">
          <label class="label">Climber:</label>
          <label class="label" style="margin-top:10px;">Robô tentou escalar?</label>

          <div class="toggle-row" style="margin-top:10px;">
            <button id="climbYes" type="button" class="toggle-btn">SIM</button>
            <button id="climbNo" type="button" class="toggle-btn">NÃO</button>
          </div>
        </div>

        <!-- Nível atingido -->
        <div class="grid-1">
          <label class="label">Nível atingido:</label>

          <div class="climb-layout" style="margin-top:20px;">
            
            <!-- Imagem -->
            <div class="img-row">
              <img src="./climberofc.jpeg" class="climberimg" alt="Nível atingido">
            </div>

  
          <div class="levels-side">
   <button type="button" class="toggle-btn level-btn n4" data-target="nivelClimber" data-value="3">Sem Sucesso</button>
   <button type="button" class="toggle-btn level-btn n1" data-target="nivelClimber" data-value="1">Nível 3</button>
   <button type="button" class="toggle-btn level-btn n2" data-target="nivelClimber" data-value="2">Nível 2</button>
   <button type="button" class="toggle-btn level-btn n3" data-target="nivelClimber" data-value="3">Nível 1</button>


          </div>

          <!-- ID oficial do banco -->
          <input type="hidden" id="nivelClimber" value="">
        </div>

        <!-- Penalidades -->
        <div class="grid-1">
          <label class="label">Penalidades:</label>
          <label class="label" style="margin-top:35px;">Recebeu cartão amarelo?</label>

          <div class="toggle-row" style="margin-top:10px;">
            <button id="yellowYes" type="button" class="toggle-btn">SIM</button>
            <button id="yellowNo" type="button" class="toggle-btn">NÃO</button>
          </div>
        </div>
        
        <!-- Observações -->


        <div class="grid-1">
          <label class="field">
            <span class="label">Observações:</span>
            <textarea id="observacoes" rows="4" placeholder="Escreva observações aqui..."></textarea>
          </label>
        </div>

      </form>
    </section>

    <footer class="footer">
      <small>Federal Force — Endgame</small>
    </footer>
  </main>

  <div id="toast" class="toast" aria-live="polite"></div>
  <script src="./draft-utils.js"></script>
  <script src="./endgame.js"></script>
</body>
</html>
